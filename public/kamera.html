<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Kamera — Cam Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root{--bg:#0a0a12;--card:#1a1a2e;--purple:#6366f1;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--text:#f0f0ff;--muted:#60607a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    #video-container{position:fixed;inset:0;background:#000}
    video{width:100%;height:100%;object-fit:cover;display:block}

    /* HUD overlay */
    .hud{position:fixed;top:0;left:0;right:0;padding:16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:10;pointer-events:none}
    .hud-cam{display:flex;align-items:center;gap:8px}
    .hud-name{font-size:.9rem;font-weight:700;color:#fff}
    .hud-room{font-size:.65rem;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace}
    .live-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:.65rem;font-weight:700;letter-spacing:.08em;background:rgba(239,68,68,.25);border:1px solid rgba(239,68,68,.5);color:#ff8080}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Status panel */
    #status-panel{position:fixed;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);z-index:10;display:flex;justify-content:center}
    .status-card{background:rgba(10,10,18,.85);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.25);border-radius:20px;padding:16px 24px;text-align:center;max-width:360px;width:100%}
    .status-icon{font-size:2.5rem;margin-bottom:8px}
    .status-title{font-size:1rem;font-weight:700;margin-bottom:6px}
    .status-sub{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:14px}
    .retry-btn{padding:11px 28px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--cyan));border:none;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s}
    .retry-btn:hover{opacity:.85}

    /* REC badge */
    .rec-badge{position:fixed;top:16px;right:16px;display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;background:rgba(239,68,68,.85);color:#fff;font-size:.7rem;font-weight:700;letter-spacing:.08em;z-index:20;opacity:0;transition:.3s}
    .rec-badge.show{opacity:1}

    /* Flash overlay */
    .flash-overlay{position:fixed;inset:0;background:#fff;z-index:100;opacity:0;pointer-events:none;transition:.1s}
    .flash-overlay.on{opacity:.8}

    /* Controls bar (only shown when connected) */
    #ctrl-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:20;opacity:0;transition:.3s;pointer-events:none}
    #ctrl-bar.show{opacity:1;pointer-events:auto}
    .ctrl-fab{width:48px;height:48px;border-radius:14px;background:rgba(10,10,18,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
    .ctrl-fab:active{transform:scale(.9)}

    /* Zoom controls */
    #zoom-bar{position:fixed;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:20;opacity:0;transition:.3s;pointer-events:none}
    #zoom-bar.show{opacity:1;pointer-events:auto}
    .zoom-fab{width:44px;height:44px;border-radius:12px;background:rgba(10,10,18,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent;user-select:none}
    .zoom-fab:active{transform:scale(.88);background:rgba(99,102,241,.5)}
    #zoom-level{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace;background:rgba(10,10,18,.7);padding:3px 6px;border-radius:6px;text-align:center;min-width:36px}

    /* Zoom indicator (flash saat zoom berubah) */
    #zoom-indicator{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,18,.75);backdrop-filter:blur(12px);border:1px solid rgba(99,102,241,.35);color:#fff;font-size:1.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;padding:10px 22px;border-radius:14px;z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
    #zoom-indicator.show{opacity:1}

    /* Camera control panel (di atas ctrl-bar) */
    #cam-panel{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:20;display:none;width:92%;max-width:380px;background:rgba(10,10,18,.88);backdrop-filter:blur(16px);border:1px solid rgba(99,102,241,.25);border-radius:18px;padding:12px 14px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .cam-panel-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .cam-panel-row:last-child{margin-bottom:0}
    .cam-panel-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);margin-bottom:5px}

    /* Flip Buttons */
    .cam-flip-btn{flex:1;padding:9px 6px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:.75rem;font-weight:600;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:5px}
    .cam-flip-btn:active{transform:scale(.94)}
    .cam-flip-btn.active{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.6);color:var(--cyan)}

    /* Lens Preset Buttons */
    #lens-preset-row{display:flex;gap:6px;flex-wrap:wrap}
    .lens-btn{padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:.78rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'JetBrains Mono',monospace;-webkit-tap-highlight-color:transparent;flex:1;min-width:48px;text-align:center}
    .lens-btn:active{transform:scale(.92)}
    .lens-btn.active{background:rgba(6,182,212,.2);border-color:rgba(6,182,212,.6);color:var(--cyan)}

    /* External device dropdown */
    #device-select{width:100%;padding:9px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#f0f0ff;font-family:'Inter',sans-serif;font-size:.78rem;outline:none;cursor:pointer}
    #ext-cam-row{display:none}

    /* Indikator kecil: server offline tapi P2P masih aktif */
    #server-indicator{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,.9);color:#000;font-size:.65rem;font-weight:700;padding:5px 12px;border-radius:999px;z-index:25;display:none;white-space:nowrap;animation:fadeInOut 2.5s ease-in-out infinite}
    @keyframes fadeInOut{0%,100%{opacity:1}50%{opacity:.5}}
  </style>
</head>
<body>

  <div id="video-container">
    <video id="local-video" autoplay muted playsinline></video>
  </div>

  <!-- HUD -->
  <div class="hud" id="hud" style="display:none">
    <div class="hud-cam">
      <div class="hud-name" id="hud-name">Kamera</div>
      <div class="hud-room" id="hud-room"></div>
    </div>
    <div class="live-pill" id="live-pill" style="display:none">
      <div class="live-dot"></div> LIVE
    </div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel">
    <div class="status-card" id="status-card">
      <div class="status-icon" id="s-icon">📡</div>
      <div class="status-title" id="s-title">Menghubungkan...</div>
      <div class="status-sub" id="s-sub">Menyambung ke server signaling</div>
      <button class="retry-btn" id="s-btn" onclick="initCamera()" style="display:none">🔄 Coba Lagi</button>
    </div>
  </div>

  <div class="rec-badge" id="rec-badge">⏺ REC</div>
  <div class="flash-overlay" id="flash-ov"></div>

  <!-- Camera Control Panel -->
  <div id="cam-panel">
    <!-- Row 1: Depan / Belakang -->
    <div class="cam-panel-label">📷 Pilih Kamera</div>
    <div class="cam-panel-row">
      <button class="cam-flip-btn" id="btn-back" onclick="setFacing('environment')">🔙 Belakang</button>
      <button class="cam-flip-btn" id="btn-front" onclick="setFacing('user')">🤳 Depan</button>
    </div>

    <!-- Row 2: Preset Lensa (Ultrawide / Normal / Tele) —
         Diisi otomatis oleh buildLensPresets() berdasarkan kemampuan kamera -->
    <div id="lens-preset-section" style="display:none">
      <div class="cam-panel-label" style="margin-top:8px">🔭 Lensa</div>
      <div id="lens-preset-row" class="cam-panel-row" style="margin-bottom:0"></div>
    </div>

    <!-- Row 3: Kamera Eksternal (GoPro / Sony / Webcam / Capture Card) -->
    <div id="ext-cam-row">
      <div class="cam-panel-label" style="margin-top:8px">🔌 Kamera Eksternal</div>
      <div class="cam-panel-row" style="margin-bottom:0">
        <select id="device-select" onchange="changeCameraDevice(this.value)">
          <option value="">— Pilih Perangkat —</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Zoom Controls -->
  <div id="zoom-bar">
    <button class="zoom-fab" onclick="stepZoom(1)" title="Zoom In">🔍</button>
    <div id="zoom-level">1×</div>
    <button class="zoom-fab" onclick="stepZoom(-1)" title="Zoom Out">🔎</button>
  </div>

  <!-- Zoom Indicator Popup -->
  <div id="zoom-indicator"></div>

  <script>
    // ============================================================
    // URL PARAMS
    // ============================================================
    const params  = new URLSearchParams(location.search);
    const ROOM_ID = params.get('room');
    const CAM_ID  = params.get('cam');
    const CAM_NAME = params.get('name') || 'Kamera';

    if (!ROOM_ID || !CAM_ID) {
      document.getElementById('s-icon').textContent = '⚠️';
      document.getElementById('s-title').textContent = 'Link Tidak Valid';
      document.getElementById('s-sub').textContent = 'Scan ulang QR Code dari Dashboard.';
    }

    // ============================================================
    // STATE
    // ============================================================
    const socket = io();
    let pc = null;
    let localStream = null;
    let facingMode = 'environment';
    let isMuted = false;
    let isFlashOn = false;
    let currentResolution = '720p';

    // ============================================================
    // ZOOM STATE
    // ============================================================
    let currentZoom = 1;
    let minZoom = 1;
    let maxZoom = 1;
    let zoomStep = 0.5;
    let zoomIndicatorTimer = null;
    let zoomSupported = false;

    function getScreenOrientation() {
      if (window.screen && window.screen.orientation && window.screen.orientation.type) {
        const type = window.screen.orientation.type;
        if (type.includes('portrait')) return 'portrait';
        if (type.includes('landscape')) return 'landscape';
      }
      return window.innerWidth < window.innerHeight ? 'portrait' : 'landscape';
    }

    let currentOrientation = getScreenOrientation();
    let selectedDeviceId = null;

    const resolutions = {
      '4k':   { width: 3840, height: 2160 },
      '1080p':{ width: 1920, height: 1080 },
      '720p': { width: 1280, height: 720  },
      '480p': { width: 854,  height: 480  },
      '360p': { width: 640,  height: 360  },
    };

    const STUN_SERVERS = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ],
    };

    // Update HUD
    document.getElementById('hud-name').textContent = CAM_NAME;
    document.getElementById('hud-room').textContent = `Room: ${ROOM_ID} • Cam: ${CAM_ID}`;

    // ============================================================
    // UI HELPERS
    // ============================================================
    function setStatus(icon, title, sub, showBtn = false) {
      document.getElementById('s-icon').textContent = icon;
      document.getElementById('s-title').textContent = title;
      document.getElementById('s-sub').textContent = sub;
      document.getElementById('s-btn').style.display = showBtn ? 'inline-flex' : 'none';
    }

    function showPanel(show) {
      document.getElementById('status-panel').style.display = show ? 'flex' : 'none';
      document.getElementById('hud').style.display = show ? 'none' : 'flex';
    }

    function showServerIndicator(msg) {
      let el = document.getElementById('server-indicator');
      if (!el) {
        el = document.createElement('div');
        el.id = 'server-indicator';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideServerIndicator() {
      const el = document.getElementById('server-indicator');
      if (el) el.style.display = 'none';
    }

    // ============================================================
    // INISIALISASI KAMERA
    // ============================================================
    async function initCamera() {
      setStatus('⏳', 'Minta Akses Kamera...', 'Izinkan akses kamera & mikrofon.');
      try {
        if (localStream) localStream.getTracks().forEach(t => t.stop());

        const res = resolutions[currentResolution] || resolutions['720p'];
        const isPortrait = currentOrientation === 'portrait';
        
        const videoConstraints = {
          width: { ideal: isPortrait ? res.height : res.width }, 
          height: { ideal: isPortrait ? res.width : res.height }, 
          aspectRatio: { ideal: isPortrait ? (9/16) : (16/9) },
          frameRate: { ideal: 30 } 
        };

        // Jika user memilih kamera tertentu (misal GoPro/Capture Card)
        if (selectedDeviceId) {
          videoConstraints.deviceId = { exact: selectedDeviceId };
        } else {
          videoConstraints.facingMode = facingMode;
        }

        localStream = await navigator.mediaDevices.getUserMedia({
          video: videoConstraints,
          audio: { echoCancellation: true, noiseSuppression: true },
        });

        document.getElementById('local-video').srcObject = localStream;
        setStatus('✅', 'Kamera Aktif', 'Menunggu OBS terhubung...');

        // Mute jika perlu
        localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);

        // Cek kapabilitas zoom kamera
        await detectZoomCapabilities();

        // Update list pilihan kamera (GoPro / Webcam / Sony Mirrorless / Capture Card)
        await updateDeviceList();

        // Join room
        socket.emit('join-room', { roomId: ROOM_ID, role: 'sender', camId: CAM_ID, camName: CAM_NAME, orientation: currentOrientation });

      } catch (err) {
        console.error(err);
        setStatus('⚠️', 'Gagal Akses Kamera', `${err.message}\n\nPastikan browser mengizinkan akses kamera & mikrofon.`, true);
      }
    }

    async function updateDeviceList() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const select = document.getElementById('device-select');
        const extRow = document.getElementById('ext-cam-row');

        // Pisahkan kamera bawaan HP vs kamera eksternal
        // Kamera bawaan Android biasanya hanya punya 2 entry (depan & belakang)
        // Kamera eksternal akan ditampilkan sebagai opsi tambahan
        const builtInKeywords = ['back', 'front', 'facing', 'camera 0', 'camera 1', 'rear', 'wide', 'ultra', 'tele', 'environment', 'user'];
        const isBuiltIn = (label) => !label || builtInKeywords.some(k => label.toLowerCase().includes(k));

        const currentVal = select.value;
        select.innerHTML = '<option value="">— Pilih Perangkat —</option>';

        let hasExternal = false;
        videoDevices.forEach((device, index) => {
          const label = device.label || `Kamera ${index + 1}`;
          // Tampilkan semua, tandai mana yang kemungkinan eksternal
          const isExt = !isBuiltIn(label);
          if (isExt) hasExternal = true;
          const opt = document.createElement('option');
          opt.value = device.deviceId;
          opt.textContent = isExt ? `🔌 ${label}` : `📷 ${label}`;
          select.appendChild(opt);
        });

        // Tampilkan baris eksternal jika ada kamera selain bawaan
        extRow.style.display = (hasExternal || videoDevices.length > 2) ? 'block' : 'none';
        if (currentVal) select.value = currentVal;

        // Update tombol active Depan/Belakang
        document.getElementById('btn-back').classList.toggle('active', facingMode === 'environment' && !selectedDeviceId);
        document.getElementById('btn-front').classList.toggle('active', facingMode === 'user' && !selectedDeviceId);

        // Tampilkan panel kamera
        document.getElementById('cam-panel').style.display = 'block';

      } catch (e) {
        console.warn('Gagal memuat daftar kamera:', e);
      }
    }

    async function changeCameraDevice(deviceId) {
      selectedDeviceId = deviceId || null;
      currentZoom = 1;
      // Jika memilih dari dropdown, nonaktifkan tombol Depan/Belakang
      document.getElementById('btn-back').classList.toggle('active', !selectedDeviceId && facingMode === 'environment');
      document.getElementById('btn-front').classList.toggle('active', !selectedDeviceId && facingMode === 'user');
      await restartCamera();
    }

    async function setFacing(mode) {
      selectedDeviceId = null; // Lepaskan kamera eksternal jika ada
      facingMode = mode;
      currentZoom = 1;
      document.getElementById('btn-back').classList.toggle('active', mode === 'environment');
      document.getElementById('btn-front').classList.toggle('active', mode === 'user');
      document.getElementById('device-select').value = '';
      await restartCamera();
    }

    // ============================================================
    // ZOOM — Deteksi, Terapkan, Pinch Gesture
    // ============================================================
    async function detectZoomCapabilities() {
      const track = localStream?.getVideoTracks()[0];
      if (!track) return;
      try {
        const caps = track.getCapabilities();
        if (caps && caps.zoom) {
          zoomSupported = true;
          minZoom = caps.zoom.min || 1;
          maxZoom = caps.zoom.max || 10;
          zoomStep = (maxZoom - minZoom) / 20;
          currentZoom = Math.max(minZoom, Math.min(maxZoom, currentZoom));
          console.log(`[Zoom] Didukung! min=${minZoom} max=${maxZoom}`);
          buildLensPresets(minZoom, maxZoom);
        } else {
          zoomSupported = false;
          minZoom = 1; maxZoom = 5; zoomStep = 0.5;
          // Sembunyikan preset lensa jika tidak ada native zoom
          document.getElementById('lens-preset-section').style.display = 'none';
          console.log('[Zoom] Native zoom tidak didukung, pakai CSS transform.');
        }
        updateZoomUI();
      } catch(e) {
        zoomSupported = false;
        minZoom = 1; maxZoom = 5; zoomStep = 0.5;
        document.getElementById('lens-preset-section').style.display = 'none';
      }
    }

    // Buat tombol preset lensa otomatis berdasarkan range zoom kamera
    function buildLensPresets(minZ, maxZ) {
      // Kandidat preset (sesuai lensa umum: ultrawide, normal, tele 2x, tele 5x, tele 10x)
      const candidates = [0.5, 0.6, 0.7, 1.0, 2.0, 3.0, 5.0, 10.0];
      const labels     = { 0.5:'0.5×', 0.6:'0.6×', 0.7:'0.7×', 1.0:'1×', 2.0:'2×', 3.0:'3×', 5.0:'5×', 10.0:'10×' };
      const icons      = { 0.5:'🌐', 0.6:'🌐', 0.7:'🌐', 1.0:'📷', 2.0:'🔭', 3.0:'🔭', 5.0:'🔭', 10.0:'🔭' };

      // Filter preset yang masuk dalam range kamera ini
      const valid = candidates.filter(v => v >= minZ - 0.05 && v <= maxZ + 0.05);

      const row = document.getElementById('lens-preset-row');
      row.innerHTML = '';

      if (valid.length <= 1) {
        // Tidak ada pilihan lensa berarti, sembunyikan saja
        document.getElementById('lens-preset-section').style.display = 'none';
        return;
      }

      document.getElementById('lens-preset-section').style.display = 'block';

      valid.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'lens-btn' + (Math.abs(v - currentZoom) < 0.05 ? ' active' : '');
        btn.dataset.zoom = v;
        btn.innerHTML = `${icons[v]}<br><span style="font-size:.6rem">${labels[v]}</span>`;
        btn.onclick = () => {
          // Update active state
          document.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyZoom(v);
        };
        row.appendChild(btn);
      });

      // Set zoom step lebih halus saat pakai tombol +/-
      zoomStep = (maxZ - minZ) / 30;
    }

    async function applyZoom(level) {
      currentZoom = Math.max(minZoom, Math.min(maxZoom, level));
      const track = localStream?.getVideoTracks()[0];

      if (zoomSupported && track) {
        try {
          await track.applyConstraints({ advanced: [{ zoom: currentZoom }] });
        } catch(e) { console.warn('[Zoom] applyConstraints gagal:', e); }
      } else {
        const video = document.getElementById('local-video');
        video.style.transform = currentZoom > 1 ? `scale(${currentZoom})` : '';
      }

      updateZoomUI();
      showZoomIndicator();

      // Sinkronkan tombol preset aktif
      document.querySelectorAll('.lens-btn').forEach(b => {
        b.classList.toggle('active', Math.abs(parseFloat(b.dataset.zoom) - currentZoom) < 0.1);
      });
    }

    function stepZoom(direction) {
      applyZoom(currentZoom + (direction * zoomStep));
    }

    function updateZoomUI() {
      const label = currentZoom.toFixed(currentZoom < 10 ? 1 : 0) + '×';
      document.getElementById('zoom-level').textContent = label;
    }

    function showZoomIndicator() {
      const el = document.getElementById('zoom-indicator');
      el.textContent = currentZoom.toFixed(1) + '×';
      el.classList.add('show');
      clearTimeout(zoomIndicatorTimer);
      zoomIndicatorTimer = setTimeout(() => el.classList.remove('show'), 900);
    }

    // Pinch-to-Zoom gesture
    function setupPinchZoom() {
      const container = document.getElementById('video-container');
      let initialDist = 0;
      let initialZoom = 1;

      container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          initialDist = Math.hypot(dx, dy);
          initialZoom = currentZoom;
          e.preventDefault();
        }
      }, { passive: false });

      container.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.hypot(dx, dy);
          const scale = dist / initialDist;
          applyZoom(initialZoom * scale);
          e.preventDefault();
        }
      }, { passive: false });
    }

    setupPinchZoom();

    // ============================================================
    // WEBRTC — BUAT PEER CONNECTION
    // ============================================================
    function createPC() {
      if (pc) { pc.close(); pc = null; }

      pc = new RTCPeerConnection(STUN_SERVERS);

      // Tambahkan track kamera ke PC
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      // Kirim ICE candidate ke receiver
      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          socket.emit('webrtc-ice-candidate', { roomId: ROOM_ID, camId: CAM_ID, candidate, targetRole: 'receiver' });
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') {
          showPanel(false);
          document.getElementById('live-pill').style.display = 'flex';
          document.getElementById('rec-badge').classList.add('show');
          document.getElementById('zoom-bar').classList.add('show');
          setStatus('🔴', 'LIVE', 'Streaming ke OBS sedang berjalan.');
        } else if (['disconnected','failed'].includes(pc.connectionState)) {
          showPanel(true);
          document.getElementById('live-pill').style.display = 'none';
          document.getElementById('rec-badge').classList.remove('show');
          document.getElementById('zoom-bar').classList.remove('show');
          setStatus('📡', 'Koneksi Terputus', 'OBS terputus. Menunggu reconnect...', true);
        }
      };

      return pc;
    }

    // ============================================================
    // SOCKET EVENTS
    // ============================================================
    socket.on('connect', () => {
      setStatus('📡', 'Terhubung ke Server', 'Menyiapkan kamera...');
      // Sembunyikan indikator offline jika pernah tampil
      hideServerIndicator();
      if (ROOM_ID && CAM_ID) initCamera();
    });

    socket.on('disconnect', () => {
      // Hanya tampilkan panel error besar jika P2P juga tidak aktif.
      // Jika video P2P masih mengalir via WiFi lokal, cukup tampilkan indikator kecil.
      const p2pActive = pc && pc.connectionState === 'connected';
      if (p2pActive) {
        showServerIndicator('⚠️ Server Offline – Kamera P2P Masih Aktif');
      } else {
        setStatus('❌', 'Server Terputus', 'Mencoba reconnect...', false);
        showPanel(true);
      }
    });

    // Saat internet kembali: hapus indikator dan rejoin room di server
    socket.on('connect', () => {
      hideServerIndicator();
    });

    socket.on('start-streaming', async ({ camId }) => {
      if (camId !== CAM_ID) return;
      if (!localStream) return;

      setStatus('⏳', 'Membuat Koneksi P2P...', 'WebRTC handshake sedang berlangsung...');
      const peerConn = createPC();

      const offer = await peerConn.createOffer();
      await peerConn.setLocalDescription(offer);
      socket.emit('webrtc-offer', { roomId: ROOM_ID, camId: CAM_ID, offer });
    });

    socket.on('webrtc-answer', async ({ camId, answer }) => {
      if (camId !== CAM_ID || !pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
      applyBitrateLimit();
    });

    function applyBitrateLimit() {
      if (!pc) return;
      const senders = pc.getSenders();
      const videoSender = senders.find(s => s.track && s.track.kind === 'video');
      if (videoSender) {
        try {
          const parameters = videoSender.getParameters();
          if (!parameters.encodings) parameters.encodings = [{}];
          
          let maxBitrate = 1200000; // default 720p: 1.2 Mbps
          if (currentResolution === '1080p') maxBitrate = 2200000; // 2.2 Mbps
          else if (currentResolution === '480p') maxBitrate = 600000; // 600 kbps
          else if (currentResolution === '360p') maxBitrate = 300000; // 300 kbps
          else if (currentResolution === '4k') maxBitrate = 6000000; // 6 Mbps
          
          parameters.encodings[0].maxBitrate = maxBitrate;
          videoSender.setParameters(parameters)
            .then(() => console.log(`[WebRTC] Bitrate limit applied: ${maxBitrate / 1000} kbps`))
            .catch(err => console.warn('Gagal set bitrate limit:', err));
        } catch (e) {
          console.warn('Error applyBitrateLimit:', e);
        }
      }
    }

    socket.on('webrtc-ice-candidate', async ({ camId, candidate }) => {
      if (camId !== CAM_ID || !pc) return;
      try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    });

    socket.on('sender-disconnected', ({ camId }) => {
      if (camId !== CAM_ID) return;
      showPanel(true);
      setStatus('📡', 'OBS Terputus', 'Menunggu OBS terhubung kembali...', true);
    });

    socket.on('camera-deleted', ({ camId }) => {
      if (camId !== CAM_ID) return;
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      if (pc) {
        pc.close();
        pc = null;
      }
      showPanel(true);
      setStatus('🗑️', 'Kamera Dihapus', 'Kamera ini telah dihapus dari Dashboard.', false);
    });

    socket.on('room-not-found', () => {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      showPanel(true);
      setStatus('⚠️', 'Room Tidak Ditemukan', 'Room ini sudah tidak aktif atau telah dihapus.', false);
    });

    socket.on('camera-not-found', () => {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      showPanel(true);
      setStatus('⚠️', 'Kamera Tidak Terdaftar', 'Kamera ini tidak terdaftar atau telah dihapus dari Dashboard.', false);
    });

    // ============================================================
    // REMOTE COMMANDS DARI DASHBOARD
    // ============================================================
    socket.on('remote-command', async ({ command, value }) => {
      switch (command) {
        case 'flip-camera':
          facingMode = facingMode === 'environment' ? 'user' : 'environment';
          await restartCamera();
          break;

        case 'toggle-mic':
          isMuted = !isMuted;
          localStream?.getAudioTracks().forEach(t => t.enabled = !isMuted);
          break;

        case 'toggle-flash':
          isFlashOn = !isFlashOn;
          await applyFlash(isFlashOn);
          break;

        case 'screenshot':
          takeScreenshot();
          break;

        case 'change-resolution':
          currentResolution = value;
          await restartCamera();
          break;

        case 'change-orientation':
          currentOrientation = value;
          await restartCamera();
          break;

        case 'change-zoom':
          await applyZoom(parseFloat(value));
          break;
      }
    });

    async function restartCamera() {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
      }
      await initCamera();

      if (pc) {
        const videoTrack = localStream?.getVideoTracks()[0];
        const audioTrack = localStream?.getAudioTracks()[0];

        const senders = pc.getSenders();
        const videoSender = senders.find(s => s.track && s.track.kind === 'video');
        const audioSender = senders.find(s => s.track && s.track.kind === 'audio');

        if (videoSender && videoTrack) {
          videoSender.replaceTrack(videoTrack).catch(err => console.warn('replace video track error:', err));
        }
        if (audioSender && audioTrack) {
          audioSender.replaceTrack(audioTrack).catch(err => console.warn('replace audio track error:', err));
        }
        applyBitrateLimit();
      }
    }

    async function applyFlash(on) {
      const track = localStream?.getVideoTracks()[0];
      if (!track) return;
      try {
        await track.applyConstraints({ advanced: [{ torch: on }] });
      } catch {
        // Flash tidak didukung di perangkat ini
        const fo = document.getElementById('flash-ov');
        if (on) fo.classList.add('on');
        else fo.classList.remove('on');
      }
    }

    function takeScreenshot() {
      const video = document.getElementById('local-video');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/jpeg', 0.92);
      a.download = `screenshot-${CAM_NAME}-${Date.now()}.jpg`;
      a.click();
    }

    // Cegah sleep mode di HP
    let wakeLock = null;
    async function requestWakeLock() {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
    document.addEventListener('visibilitychange', async () => {
      if (wakeLock && document.visibilityState === 'visible') await requestWakeLock();
    });
    requestWakeLock();

    // Listen physical orientation changes
    function handleOrientationChange() {
      const newOri = getScreenOrientation();
      if (newOri !== currentOrientation) {
        currentOrientation = newOri;
        console.log('[Kamera] Orientasi fisik berubah:', currentOrientation);
        socket.emit('update-orientation', { roomId: ROOM_ID, camId: CAM_ID, orientation: currentOrientation });
        restartCamera();
      }
    }

    if (window.screen && window.screen.orientation) {
      window.screen.orientation.addEventListener('change', handleOrientationChange);
    } else {
      window.addEventListener('orientationchange', handleOrientationChange);
      window.addEventListener('resize', handleOrientationChange);
    }
  </script>
</body>
</html>
