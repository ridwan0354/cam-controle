<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Kamera — Cam Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root{--bg:#0a0a12;--card:#1a1a2e;--purple:#6366f1;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--text:#f0f0ff;--muted:#60607a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    #video-container{position:fixed;inset:0;background:#000}
    video{width:100%;height:100%;object-fit:cover;display:block}

    /* HUD overlay */
    .hud{position:fixed;top:0;left:0;right:0;padding:16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:10;pointer-events:none}
    .hud-cam{display:flex;align-items:center;gap:8px}
    .hud-name{font-size:.9rem;font-weight:700;color:#fff}
    .hud-room{font-size:.65rem;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace}
    .live-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:.65rem;font-weight:700;letter-spacing:.08em;background:rgba(239,68,68,.25);border:1px solid rgba(239,68,68,.5);color:#ff8080}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Status panel */
    #status-panel{position:fixed;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);z-index:10;display:flex;justify-content:center}
    .status-card{background:rgba(10,10,18,.85);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.25);border-radius:20px;padding:16px 24px;text-align:center;max-width:360px;width:100%}
    .status-icon{font-size:2.5rem;margin-bottom:8px}
    .status-title{font-size:1rem;font-weight:700;margin-bottom:6px}
    .status-sub{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:14px}
    .retry-btn{padding:11px 28px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--cyan));border:none;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s}
    .retry-btn:hover{opacity:.85}

    /* REC badge */
    .rec-badge{position:fixed;top:16px;right:16px;display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;background:rgba(239,68,68,.85);color:#fff;font-size:.7rem;font-weight:700;letter-spacing:.08em;z-index:20;opacity:0;transition:.3s}
    .rec-badge.show{opacity:1}

    /* Flash overlay */
    .flash-overlay{position:fixed;inset:0;background:#fff;z-index:100;opacity:0;pointer-events:none;transition:.1s}
    .flash-overlay.on{opacity:.8}

    /* Controls bar (only shown when connected) */
    #ctrl-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:20;opacity:0;transition:.3s;pointer-events:none}
    #ctrl-bar.show{opacity:1;pointer-events:auto}
    .ctrl-fab{width:48px;height:48px;border-radius:14px;background:rgba(10,10,18,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
    .ctrl-fab:active{transform:scale(.9)}
  </style>
</head>
<body>

  <div id="video-container">
    <video id="local-video" autoplay muted playsinline></video>
  </div>

  <!-- HUD -->
  <div class="hud" id="hud" style="display:none">
    <div class="hud-cam">
      <div class="hud-name" id="hud-name">Kamera</div>
      <div class="hud-room" id="hud-room"></div>
    </div>
    <div class="live-pill" id="live-pill" style="display:none">
      <div class="live-dot"></div> LIVE
    </div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel">
    <div class="status-card" id="status-card">
      <div class="status-icon" id="s-icon">📡</div>
      <div class="status-title" id="s-title">Menghubungkan...</div>
      <div class="status-sub" id="s-sub">Menyambung ke server signaling</div>
      <button class="retry-btn" id="s-btn" onclick="initCamera()" style="display:none">🔄 Coba Lagi</button>
    </div>
  </div>

  <div class="rec-badge" id="rec-badge">⏺ REC</div>
  <div class="flash-overlay" id="flash-ov"></div>

  <!-- Device Selector Dropdown (Untuk Kamera External / GoPro / Webcam) -->
  <div id="device-select-wrap" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99;display:none;width:90%;max-width:320px">
    <select id="device-select" style="width:100%;padding:11px 16px;background:rgba(10,10,18,0.9);backdrop-filter:blur(10px);border:1px solid rgba(99,102,241,0.35);border-radius:12px;color:#f0f0ff;font-family:'Inter',sans-serif;font-size:0.8rem;outline:none;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,0.5)" onchange="changeCameraDevice(this.value)">
      <option value="">Default Camera</option>
    </select>
  </div>

  <script>
    // ============================================================
    // URL PARAMS
    // ============================================================
    const params  = new URLSearchParams(location.search);
    const ROOM_ID = params.get('room');
    const CAM_ID  = params.get('cam');
    const CAM_NAME = params.get('name') || 'Kamera';

    if (!ROOM_ID || !CAM_ID) {
      document.getElementById('s-icon').textContent = '⚠️';
      document.getElementById('s-title').textContent = 'Link Tidak Valid';
      document.getElementById('s-sub').textContent = 'Scan ulang QR Code dari Dashboard.';
    }

    // ============================================================
    // STATE
    // ============================================================
    const socket = io();
    let pc = null;
    let localStream = null;
    let facingMode = 'environment';
    let isMuted = false;
    let isFlashOn = false;
    let currentResolution = '720p';
    let currentOrientation = 'landscape';
    let selectedDeviceId = null;

    const resolutions = {
      '4k':   { width: 3840, height: 2160 },
      '1080p':{ width: 1920, height: 1080 },
      '720p': { width: 1280, height: 720  },
      '480p': { width: 854,  height: 480  },
      '360p': { width: 640,  height: 360  },
    };

    const STUN_SERVERS = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ],
    };

    // Update HUD
    document.getElementById('hud-name').textContent = CAM_NAME;
    document.getElementById('hud-room').textContent = `Room: ${ROOM_ID} • Cam: ${CAM_ID}`;

    // ============================================================
    // UI HELPERS
    // ============================================================
    function setStatus(icon, title, sub, showBtn = false) {
      document.getElementById('s-icon').textContent = icon;
      document.getElementById('s-title').textContent = title;
      document.getElementById('s-sub').textContent = sub;
      document.getElementById('s-btn').style.display = showBtn ? 'inline-flex' : 'none';
    }

    function showPanel(show) {
      document.getElementById('status-panel').style.display = show ? 'flex' : 'none';
      document.getElementById('hud').style.display = show ? 'none' : 'flex';
    }

    // ============================================================
    // INISIALISASI KAMERA
    // ============================================================
    async function initCamera() {
      setStatus('⏳', 'Minta Akses Kamera...', 'Izinkan akses kamera & mikrofon.');
      try {
        if (localStream) localStream.getTracks().forEach(t => t.stop());

        const res = resolutions[currentResolution] || resolutions['720p'];
        const isPortrait = currentOrientation === 'portrait';
        
        const videoConstraints = {
          width: { ideal: isPortrait ? res.height : res.width }, 
          height: { ideal: isPortrait ? res.width : res.height }, 
          aspectRatio: { ideal: isPortrait ? (9/16) : (16/9) },
          frameRate: { ideal: 30 } 
        };

        // Jika user memilih kamera tertentu (misal GoPro/Capture Card)
        if (selectedDeviceId) {
          videoConstraints.deviceId = { exact: selectedDeviceId };
        } else {
          videoConstraints.facingMode = facingMode;
        }

        localStream = await navigator.mediaDevices.getUserMedia({
          video: videoConstraints,
          audio: { echoCancellation: true, noiseSuppression: true },
        });

        document.getElementById('local-video').srcObject = localStream;
        setStatus('✅', 'Kamera Aktif', 'Menunggu OBS terhubung...');

        // Mute jika perlu
        localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);

        // Update list pilihan kamera (GoPro / Webcam / Capture Card)
        await updateDeviceList();

        // Join room
        socket.emit('join-room', { roomId: ROOM_ID, role: 'sender', camId: CAM_ID, camName: CAM_NAME });

      } catch (err) {
        console.error(err);
        setStatus('⚠️', 'Gagal Akses Kamera', `${err.message}\n\nPastikan browser mengizinkan akses kamera & mikrofon.`, true);
      }
    }

    async function updateDeviceList() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const select = document.getElementById('device-select');
        
        const currentVal = select.value;
        select.innerHTML = '<option value="">Default Camera</option>';
        
        videoDevices.forEach((device, index) => {
          const opt = document.createElement('option');
          opt.value = device.deviceId;
          opt.textContent = device.label || `Kamera ${index + 1}`;
          select.appendChild(opt);
        });

        // Tampilkan select jika terdeteksi lebih dari 1 pilihan kamera
        if (videoDevices.length > 1) {
          document.getElementById('device-select-wrap').style.display = 'block';
          if (currentVal) select.value = currentVal;
        } else {
          document.getElementById('device-select-wrap').style.display = 'none';
        }
      } catch (e) {
        console.warn('Gagal memuat daftar kamera:', e);
      }
    }

    async function changeCameraDevice(deviceId) {
      selectedDeviceId = deviceId || null;
      await restartCamera();
    }

    // ============================================================
    // WEBRTC — BUAT PEER CONNECTION
    // ============================================================
    function createPC() {
      if (pc) { pc.close(); pc = null; }

      pc = new RTCPeerConnection(STUN_SERVERS);

      // Tambahkan track kamera ke PC
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      // Kirim ICE candidate ke receiver
      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          socket.emit('webrtc-ice-candidate', { roomId: ROOM_ID, camId: CAM_ID, candidate, targetRole: 'receiver' });
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') {
          showPanel(false);
          document.getElementById('live-pill').style.display = 'flex';
          document.getElementById('rec-badge').classList.add('show');
          setStatus('🔴', 'LIVE', 'Streaming ke OBS sedang berjalan.');
        } else if (['disconnected','failed'].includes(pc.connectionState)) {
          showPanel(true);
          document.getElementById('live-pill').style.display = 'none';
          document.getElementById('rec-badge').classList.remove('show');
          setStatus('📡', 'Koneksi Terputus', 'OBS terputus. Menunggu reconnect...', true);
        }
      };

      return pc;
    }

    // ============================================================
    // SOCKET EVENTS
    // ============================================================
    socket.on('connect', () => {
      setStatus('📡', 'Terhubung ke Server', 'Menyiapkan kamera...');
      if (ROOM_ID && CAM_ID) initCamera();
    });

    socket.on('disconnect', () => {
      setStatus('❌', 'Server Terputus', 'Mencoba reconnect...', false);
      showPanel(true);
    });

    socket.on('start-streaming', async ({ camId }) => {
      if (camId !== CAM_ID) return;
      if (!localStream) return;

      setStatus('⏳', 'Membuat Koneksi P2P...', 'WebRTC handshake sedang berlangsung...');
      const peerConn = createPC();

      const offer = await peerConn.createOffer();
      await peerConn.setLocalDescription(offer);
      socket.emit('webrtc-offer', { roomId: ROOM_ID, camId: CAM_ID, offer });
    });

    socket.on('webrtc-answer', async ({ camId, answer }) => {
      if (camId !== CAM_ID || !pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
      applyBitrateLimit();
    });

    function applyBitrateLimit() {
      if (!pc) return;
      const senders = pc.getSenders();
      const videoSender = senders.find(s => s.track && s.track.kind === 'video');
      if (videoSender) {
        try {
          const parameters = videoSender.getParameters();
          if (!parameters.encodings) parameters.encodings = [{}];
          
          let maxBitrate = 1200000; // default 720p: 1.2 Mbps
          if (currentResolution === '1080p') maxBitrate = 2200000; // 2.2 Mbps
          else if (currentResolution === '480p') maxBitrate = 600000; // 600 kbps
          else if (currentResolution === '360p') maxBitrate = 300000; // 300 kbps
          else if (currentResolution === '4k') maxBitrate = 6000000; // 6 Mbps
          
          parameters.encodings[0].maxBitrate = maxBitrate;
          videoSender.setParameters(parameters)
            .then(() => console.log(`[WebRTC] Bitrate limit applied: ${maxBitrate / 1000} kbps`))
            .catch(err => console.warn('Gagal set bitrate limit:', err));
        } catch (e) {
          console.warn('Error applyBitrateLimit:', e);
        }
      }
    }

    socket.on('webrtc-ice-candidate', async ({ camId, candidate }) => {
      if (camId !== CAM_ID || !pc) return;
      try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    });

    socket.on('sender-disconnected', ({ camId }) => {
      if (camId !== CAM_ID) return;
      showPanel(true);
      setStatus('📡', 'OBS Terputus', 'Menunggu OBS terhubung kembali...', true);
    });

    socket.on('camera-deleted', ({ camId }) => {
      if (camId !== CAM_ID) return;
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      if (pc) {
        pc.close();
        pc = null;
      }
      showPanel(true);
      setStatus('🗑️', 'Kamera Dihapus', 'Kamera ini telah dihapus dari Dashboard.', false);
    });

    socket.on('room-not-found', () => {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      showPanel(true);
      setStatus('⚠️', 'Room Tidak Ditemukan', 'Room ini sudah tidak aktif atau telah dihapus.', false);
    });

    socket.on('camera-not-found', () => {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      showPanel(true);
      setStatus('⚠️', 'Kamera Tidak Terdaftar', 'Kamera ini tidak terdaftar atau telah dihapus dari Dashboard.', false);
    });

    // ============================================================
    // REMOTE COMMANDS DARI DASHBOARD
    // ============================================================
    socket.on('remote-command', async ({ command, value }) => {
      switch (command) {
        case 'flip-camera':
          facingMode = facingMode === 'environment' ? 'user' : 'environment';
          await restartCamera();
          break;

        case 'toggle-mic':
          isMuted = !isMuted;
          localStream?.getAudioTracks().forEach(t => t.enabled = !isMuted);
          break;

        case 'toggle-flash':
          isFlashOn = !isFlashOn;
          await applyFlash(isFlashOn);
          break;

        case 'screenshot':
          takeScreenshot();
          break;

        case 'change-resolution':
          currentResolution = value;
          await restartCamera();
          break;

        case 'change-orientation':
          currentOrientation = value;
          await restartCamera();
          break;
      }
    });

    async function restartCamera() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      await initCamera();
    }

    async function applyFlash(on) {
      const track = localStream?.getVideoTracks()[0];
      if (!track) return;
      try {
        await track.applyConstraints({ advanced: [{ torch: on }] });
      } catch {
        // Flash tidak didukung di perangkat ini
        const fo = document.getElementById('flash-ov');
        if (on) fo.classList.add('on');
        else fo.classList.remove('on');
      }
    }

    function takeScreenshot() {
      const video = document.getElementById('local-video');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/jpeg', 0.92);
      a.download = `screenshot-${CAM_NAME}-${Date.now()}.jpg`;
      a.click();
    }

    // Cegah sleep mode di HP
    let wakeLock = null;
    async function requestWakeLock() {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
    document.addEventListener('visibilitychange', async () => {
      if (wakeLock && document.visibilityState === 'visible') await requestWakeLock();
    });
    requestWakeLock();
  </script>
</body>
</html>
