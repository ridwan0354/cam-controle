<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cam Controller – Dashboard Multi-Kamera</title>
  <meta name="description" content="Panel kontrol multi-kamera untuk sistem Mobile Camera to OBS menggunakan WebRTC." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    :root {
      --bg: #0a0a12;
      --bg2: #12121e;
      --card: #1a1a2e;
      --card2: #1e1e38;
      --border: rgba(99,102,241,.18);
      --border2: rgba(99,102,241,.45);
      --purple: #6366f1;
      --violet: #7c3aed;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --text: #f0f0ff;
      --text2: #a0a0c0;
      --muted: #60607a;
      --r: 12px; --rl: 18px;
      --t: all .25s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none}

    .wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px 20px 80px}

    /* HEADER */
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
    .logo{display:flex;align-items:center;gap:14px}
    .logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(99,102,241,.3)}
    .logo-text h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#e0e0ff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo-text p{font-size:.72rem;color:var(--muted)}
    .status-badge{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:.78rem;font-weight:500;color:var(--text2)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:var(--t)}
    .dot.active{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
    .dot.error{background:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ROOM SECTION */
    .room-section{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:22px 24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
    .room-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
    .room-id{font-family:'JetBrains Mono',monospace;font-size:1.7rem;font-weight:700;color:var(--purple);letter-spacing:.15em;text-shadow:0 0 20px rgba(99,102,241,.3)}
    .room-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:var(--t);font-family:'Inter',sans-serif;white-space:nowrap}
    .btn-primary{background:linear-gradient(135deg,var(--purple),var(--violet));color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.45)}
    .btn-secondary{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
    .btn-secondary:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
    .btn-add{background:linear-gradient(135deg,rgba(6,182,212,.2),rgba(99,102,241,.2));color:var(--cyan);border:1px solid rgba(6,182,212,.3);padding:10px 20px;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;transition:var(--t);font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:8px}
    .btn-add:hover{background:linear-gradient(135deg,rgba(6,182,212,.3),rgba(99,102,241,.3));transform:translateY(-2px)}
    .btn-add:disabled{opacity:.4;cursor:not-allowed}

    /* ADD CAMERA FORM */
    .add-cam-section{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .cam-name-input{flex:1;min-width:200px;padding:11px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:var(--t)}
    .cam-name-input:focus{border-color:var(--border2)}
    .cam-name-input::placeholder{color:var(--muted)}

    /* CAMERAS GRID */
    .section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .cameras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:18px;margin-bottom:24px}
    @media(max-width:500px){.cameras-grid{grid-template-columns:1fr}}

    /* CAMERA CARD */
    .cam-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:var(--t);display:flex;flex-direction:column}
    .cam-card:hover{border-color:var(--border2)}
    .cam-card.live{border-color:rgba(16,185,129,.4);box-shadow:0 0 20px rgba(16,185,129,.08)}

    .cam-card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:var(--bg2);border-bottom:1px solid var(--border)}
    .cam-info{display:flex;align-items:center;gap:10px}
    .cam-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .cam-name-text{font-size:.95rem;font-weight:700;color:var(--text)}
    .cam-id-text{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:1px}

    .cam-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:.68rem;font-weight:700;letter-spacing:.06em;transition:var(--t)}
    .cam-status.offline{background:rgba(96,96,122,.1);color:var(--muted);border:1px solid rgba(96,96,122,.2)}
    .cam-status.sender-only{background:rgba(245,158,11,.1);color:var(--orange);border:1px solid rgba(245,158,11,.2)}
    .cam-status.live{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3);animation:none}
    .cam-status .sdot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .cam-status.live .sdot{animation:pulse 1.2s infinite}

    .btn-remove{width:28px;height:28px;border-radius:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:var(--t);flex-shrink:0}
    .btn-remove:hover{background:rgba(239,68,68,.25)}

    /* LINKS SECTION */
    .cam-links{padding:14px 18px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border)}
    .link-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
    .link-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
    .link-badge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.06em}
    .lb-mobile{background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}
    .lb-obs{background:rgba(99,102,241,.12);color:var(--purple);border:1px solid rgba(99,102,241,.25)}
    .link-url{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--text2);word-break:break-all;line-height:1.5}
    .qr-wrap{display:flex;align-items:center;justify-content:center;background:#fff;border-radius:8px;padding:12px;margin-top:10px}

    /* REMOTE CONTROLS */
    .cam-controls{padding:14px 18px}
    .ctrl-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
    .ctrl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
    .ctrl-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 6px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:var(--t);font-family:'Inter',sans-serif;font-size:.65rem;font-weight:600}
    .ctrl-btn:hover:not(:disabled){border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
    .ctrl-btn:disabled{opacity:.3;cursor:not-allowed}
    .ctrl-btn.on{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.1);color:var(--purple)}
    .ctrl-btn .icon{font-size:1.2rem;line-height:1}
    .res-select{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.8rem;font-family:'Inter',sans-serif;cursor:pointer;outline:none;transition:var(--t)}
    .res-select:focus{border-color:var(--border2)}
    .res-select:disabled{opacity:.3;cursor:not-allowed}

    /* EMPTY STATE */
    .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .ei{font-size:3rem;margin-bottom:12px;opacity:.5}
    .empty-state p{font-size:.85rem;line-height:1.7}

    /* LOG */
    .log-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px}
    .log-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);height:140px;overflow-y:auto;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:.7rem}
    .log-box::-webkit-scrollbar{width:3px}.log-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .le{display:flex;gap:10px;margin-bottom:3px;line-height:1.5}
    .lt{color:var(--muted);flex-shrink:0}
    .lm.info{color:var(--cyan)}.lm.success{color:var(--green)}.lm.error{color:var(--red)}.lm.warn{color:var(--orange)}.lm.default{color:var(--text2)}

    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;padding:11px 20px;border-radius:10px;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:.8rem;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1)}
    .toast.show{transform:translateY(0);opacity:1}
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">
        <h1>Cam Controller</h1>
        <p>Multi-Camera → OBS Studio via WebRTC</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="dot" id="server-dot"></div>
      <span id="server-txt">Menghubungkan...</span>
    </div>
  </header>

  <!-- ROOM ID -->
  <div class="room-section">
    <div style="flex:1;min-width:200px">
      <div class="room-label">🔑 Room / Session ID</div>
      <div class="room-id" id="room-id">—</div>
      <div class="room-actions">
        <button class="btn btn-primary" onclick="createRoom()">✨ Buat Room Baru</button>
        <button class="btn btn-secondary" onclick="copyText(currentRoomId)" id="btn-copy-room" disabled>📋 Salin ID</button>
      </div>
    </div>
    <div style="font-size:.8rem;color:var(--muted);max-width:260px;line-height:1.7">
      💡 Buat room, tambahkan kamera dengan nama, lalu bagikan QR ke masing-masing HP.
    </div>
  </div>

  <!-- ADD CAMERA -->
  <div class="add-cam-section">
    <span style="font-size:.85rem;font-weight:600;color:var(--text2);white-space:nowrap">📱 Nama Kamera:</span>
    <input type="text" class="cam-name-input" id="cam-name-input" placeholder='Contoh: iPhone 15, Samsung S24, GoPro...' maxlength="30" />
    <button class="btn-add" id="btn-add-cam" onclick="addCamera()" disabled>➕ Tambah Kamera</button>
  </div>

  <!-- CAMERAS GRID -->
  <div class="section-title">
    📹 Daftar Kamera
    <span style="font-size:.65rem;background:rgba(99,102,241,.15);color:var(--purple);border:1px solid rgba(99,102,241,.25);padding:2px 8px;border-radius:999px;" id="cam-count">0 kamera</span>
  </div>
  <div class="cameras-grid" id="cameras-grid">
    <div class="empty-state">
      <div class="ei">📷</div>
      <p>Belum ada kamera.<br>Buat room lalu klik <strong>➕ Tambah Kamera</strong>.</p>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-card">
    <div class="section-title" style="justify-content:space-between">
      <span>📋 Activity Log</span>
      <button class="btn btn-secondary" style="padding:3px 10px;font-size:.68rem" onclick="clearLog()">Bersihkan</button>
    </div>
    <div class="log-box" id="log"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // STATE
  // ============================================================
  const socket = io();
  let currentRoomId = null;
  let BASE_URL = window.location.origin;

  // cameras[camId] = { name, isMuted, isFlash }
  const cameras = {};

  // ============================================================
  // BASE URL DETECTION
  // ============================================================
  async function detectBaseUrl() {
    const isHttps = window.location.protocol === 'https:';
    const isLocal = ['localhost','127.0.0.1'].includes(window.location.hostname);
    if (isHttps && !isLocal) {
      BASE_URL = window.location.origin;
    } else {
      try {
        const d = await fetch('/api/info').then(r => r.json());
        if (d.localIP && d.localIP !== 'localhost') BASE_URL = `http://${d.localIP}:${d.port}`;
      } catch {}
    }
  }

  // ============================================================
  // UTILS
  // ============================================================
  function log(msg, type = 'default') {
    const el = document.getElementById('log');
    const t = new Date().toTimeString().slice(0,8);
    el.innerHTML += `<div class="le"><span class="lt">${t}</span><span class="lm ${type}">${msg}</span></div>`;
    el.scrollTop = el.scrollHeight;
  }
  function clearLog() { document.getElementById('log').innerHTML = ''; }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function copyText(text) {
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => showToast('✅ Disalin!'));
  }

  function genId(len = 4) {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length: len}, () => c[Math.floor(Math.random() * c.length)]).join('');
  }

  // ============================================================
  // CREATE ROOM
  // ============================================================
  async function createRoom() {
    await detectBaseUrl();

    // Hapus room lama di server jika ada sebelum buat baru
    if (currentRoomId) {
      socket.emit('delete-room', { roomId: currentRoomId });
    }

    const id = genId(6);
    currentRoomId = id;

    // Reset local storage untuk room baru
    localStorage.setItem('cam_controller_room_id', id);
    localStorage.removeItem('cam_controller_cameras');
    cameras_obj_keys_clear();

    document.getElementById('room-id').textContent = id;
    document.getElementById('btn-copy-room').disabled = false;
    document.getElementById('btn-add-cam').disabled = false;
    document.getElementById('cam-name-input').focus();

    socket.emit('join-room', { roomId: id, role: 'dashboard', cameras: [] });
    log(`Room dibuat: ${id}`, 'success');
    showToast(`🔑 Room ${id} siap!`);
    clearCameraGrid();
  }

  // ============================================================
  // ADD CAMERA
  // ============================================================
  async function addCamera() {
    if (!currentRoomId) return showToast('⚠️ Buat room dulu!');
    const nameInput = document.getElementById('cam-name-input');
    const name = nameInput.value.trim() || `Kamera ${Object.keys(cameras).length + 1}`;

    const camId = genId(4);
    cameras[camId] = { name, isMuted: false, isFlash: false, resolution: '720p', orientation: 'landscape' };
    localStorage.setItem('cam_controller_cameras', JSON.stringify(cameras));

    // Daftarkan kamera baru ke server
    socket.emit('add-camera', { roomId: currentRoomId, camId, name });

    const mobileLink = `${BASE_URL}/kamera.html?room=${currentRoomId}&cam=${camId}&name=${encodeURIComponent(name)}`;
    const obsLink    = `${BASE_URL}/obs.html?room=${currentRoomId}&cam=${camId}`;

    renderCameraCard(camId, name, mobileLink, obsLink);
    updateCamCount();

    nameInput.value = '';
    nameInput.focus();
    log(`Kamera ditambah: "${name}" (${camId})`, 'info');
    showToast(`📱 Kamera "${name}" ditambahkan!`);
  }

  // ============================================================
  // RENDER CAMERA CARD
  // ============================================================
  function renderCameraCard(camId, name, mobileLink, obsLink) {
    // Hapus empty state jika ada
    const empty = document.querySelector('.empty-state');
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = 'cam-card';
    card.id = `cam-${camId}`;
    card.innerHTML = `
      <!-- HEAD -->
      <div class="cam-card-head">
        <div class="cam-info">
          <div class="cam-avatar">📱</div>
          <div>
            <div class="cam-name-text">${name}</div>
            <div class="cam-id-text">ID: ${camId}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="cam-status offline" id="st-${camId}">
            <div class="sdot"></div> <span id="st-txt-${camId}">Menunggu HP</span>
          </div>
          <button class="btn-remove" onclick="removeCamera('${camId}')" title="Hapus kamera">✕</button>
        </div>
      </div>

      <!-- LINKS -->
      <div class="cam-links">
        <!-- Mobile Link -->
        <div class="link-item">
          <div class="link-item-head">
            <span class="link-badge lb-mobile">📱 HP / Kamera</span>
            <button class="btn btn-secondary" style="padding:3px 8px;font-size:.62rem" onclick="copyText('${mobileLink}')">Salin</button>
          </div>
          <div class="link-url">${mobileLink}</div>
          <div class="qr-wrap"><div id="qr-${camId}"></div></div>
        </div>
        <!-- OBS Link -->
        <div class="link-item">
          <div class="link-item-head">
            <span class="link-badge lb-obs">🎬 OBS Browser Source</span>
            <button class="btn btn-secondary" style="padding:3px 8px;font-size:.62rem" onclick="copyText('${obsLink}')">Salin</button>
          </div>
          <div class="link-url">${obsLink}</div>
        </div>
      </div>

      <!-- REMOTE CONTROLS -->
      <div class="cam-controls">
        <div class="ctrl-title">🎮 Remote Control</div>
        <div class="ctrl-grid">
          <button class="ctrl-btn" id="c-flip-${camId}" onclick="sendCmd('${camId}','flip-camera')" disabled>
            <span class="icon">🔄</span>Flip
          </button>
          <button class="ctrl-btn" id="c-mic-${camId}" onclick="toggleMic('${camId}')" disabled>
            <span class="icon" id="mic-ic-${camId}">🎤</span><span id="mic-lb-${camId}">Mute</span>
          </button>
          <button class="ctrl-btn" id="c-flash-${camId}" onclick="toggleFlash('${camId}')" disabled>
            <span class="icon" id="flash-ic-${camId}">🔦</span><span id="flash-lb-${camId}">Flash</span>
          </button>
          <button class="ctrl-btn" id="c-shot-${camId}" onclick="sendCmd('${camId}','screenshot')" disabled>
            <span class="icon">📸</span>Shot
          </button>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <select class="res-select" id="c-res-${camId}" onchange="sendCmd('${camId}','change-resolution',this.value)" disabled style="flex:1">
            <option value="4k">4K (3840×2160)</option>
            <option value="1080p">Full HD (1920×1080)</option>
            <option value="720p" selected>HD (1280×720)</option>
            <option value="480p">SD (854×480)</option>
            <option value="360p">Low (640×360)</option>
          </select>
          <select class="res-select" id="c-ori-${camId}" onchange="sendCmd('${camId}','change-orientation',this.value)" disabled style="flex:1">
            <option value="landscape" selected>Landscape (16:9)</option>
            <option value="portrait">Portrait (9:16)</option>
          </select>
        </div>
      </div>
    `;

    document.getElementById('cameras-grid').appendChild(card);

    // Generate QR
    setTimeout(() => {
      new QRCode(document.getElementById(`qr-${camId}`), {
        text: mobileLink, width: 150, height: 150,
        colorDark: '#000', colorLight: '#fff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }, 80);
  }

  // ============================================================
  // REMOVE CAMERA
  // ============================================================
  function removeCamera(camId) {
    if (currentRoomId) {
      socket.emit('delete-camera', { roomId: currentRoomId, camId });
    }

    const card = document.getElementById(`cam-${camId}`);
    if (card) card.remove();
    delete cameras[camId];
    updateCamCount();

    localStorage.setItem('cam_controller_cameras', JSON.stringify(cameras));

    if (Object.keys(cameras).length === 0) {
      document.getElementById('cameras-grid').innerHTML = `
        <div class="empty-state">
          <div class="ei">📷</div>
          <p>Belum ada kamera.<br>Klik <strong>➕ Tambah Kamera</strong> untuk menambah.</p>
        </div>`;
    }
    log(`Kamera ${camId} dihapus`, 'warn');
  }

  function clearCameraGrid() {
    cameras_obj_keys_clear();
    document.getElementById('cameras-grid').innerHTML = `
      <div class="empty-state">
        <div class="ei">📷</div>
        <p>Belum ada kamera.<br>Klik <strong>➕ Tambah Kamera</strong> untuk menambah.</p>
      </div>`;
    updateCamCount();
  }

  function cameras_obj_keys_clear() {
    Object.keys(cameras).forEach(k => delete cameras[k]);
  }

  function updateCamCount() {
    const n = Object.keys(cameras).length;
    document.getElementById('cam-count').textContent = `${n} kamera`;
  }

  // ============================================================
  // UPDATE STATUS PER KAMERA
  // ============================================================
  function updateCamStatus(camId, sender, receiver) {
    const el = document.getElementById(`st-${camId}`);
    const txt = document.getElementById(`st-txt-${camId}`);
    const card = document.getElementById(`cam-${camId}`);
    if (!el || !txt) return;

    if (sender && receiver) {
      el.className = 'cam-status live';
      txt.textContent = '🔴 LIVE';
      card?.classList.add('live');
    } else if (sender) {
      el.className = 'cam-status sender-only';
      txt.textContent = '📱 HP Terhubung';
      card?.classList.remove('live');
    } else {
      el.className = 'cam-status offline';
      txt.textContent = 'Menunggu HP';
      card?.classList.remove('live');
    }

    // Aktifkan/matikan tombol kontrol
    const ctrlIds = [`c-flip-${camId}`, `c-mic-${camId}`, `c-flash-${camId}`, `c-shot-${camId}`, `c-res-${camId}`, `c-ori-${camId}`];
    ctrlIds.forEach(id => {
      const btn = document.getElementById(id);
      if (btn) btn.disabled = !sender;
    });
  }

  // ============================================================
  // REMOTE COMMANDS
  // ============================================================
  function sendCmd(camId, command, value = null) {
    if (!currentRoomId) return;
    socket.emit('remote-command', { roomId: currentRoomId, camId, command, value });
    log(`[${camId}] Perintah: ${command}${value ? ' → ' + value : ''}`, 'info');

    if (cameras[camId]) {
      if (command === 'change-resolution') {
        cameras[camId].resolution = value;
        localStorage.setItem('cam_controller_cameras', JSON.stringify(cameras));
      } else if (command === 'change-orientation') {
        cameras[camId].orientation = value;
        localStorage.setItem('cam_controller_cameras', JSON.stringify(cameras));
      }
    }
  }

  function toggleMic(camId) {
    if (!cameras[camId]) return;
    cameras[camId].isMuted = !cameras[camId].isMuted;
    const muted = cameras[camId].isMuted;
    document.getElementById(`mic-ic-${camId}`).textContent = muted ? '🔇' : '🎤';
    document.getElementById(`mic-lb-${camId}`).textContent = muted ? 'Unmute' : 'Mute';
    document.getElementById(`c-mic-${camId}`)?.classList.toggle('on', muted);
    sendCmd(camId, 'toggle-mic');
    localStorage.setItem('cam_controller_cameras', JSON.stringify(cameras));
  }

  function toggleFlash(camId) {
    if (!cameras[camId]) return;
    cameras[camId].isFlash = !cameras[camId].isFlash;
    const on = cameras[camId].isFlash;
    document.getElementById(`flash-ic-${camId}`).textContent = on ? '💡' : '🔦';
    document.getElementById(`flash-lb-${camId}`).textContent = on ? 'Flash Off' : 'Flash';
    document.getElementById(`c-flash-${camId}`)?.classList.toggle('on', on);
    sendCmd(camId, 'toggle-flash');
    localStorage.setItem('cam_controller_cameras', JSON.stringify(cameras));
  }

  // Enter key submit camera name
  document.getElementById('cam-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCamera();
  });

  // ============================================================
  // SOCKET EVENTS
  // ============================================================
  socket.on('connect', () => {
    document.getElementById('server-dot').className = 'dot active';
    document.getElementById('server-txt').textContent = 'Server Terhubung';
    log('Terhubung ke server ✅', 'success');
  });

  socket.on('disconnect', () => {
    document.getElementById('server-dot').className = 'dot error';
    document.getElementById('server-txt').textContent = 'Server Terputus';
    log('Koneksi terputus ❌', 'error');
  });

  socket.on('room-status', ({ cameras: camStatus }) => {
    for (const [camId, { sender, receiver, name, orientation }] of Object.entries(camStatus)) {
      updateCamStatus(camId, sender, receiver);
      
      const oriSelect = document.getElementById(`c-ori-${camId}`);
      if (oriSelect && orientation) {
        oriSelect.value = orientation;
      }
    }
  });

  // Load room dan kamera saat reload
  window.addEventListener('DOMContentLoaded', async () => {
    await detectBaseUrl();
    const savedRoomId = localStorage.getItem('cam_controller_room_id');
    const savedCamerasRaw = localStorage.getItem('cam_controller_cameras');

    if (savedRoomId) {
      currentRoomId = savedRoomId;
      document.getElementById('room-id').textContent = currentRoomId;
      document.getElementById('btn-copy-room').disabled = false;
      document.getElementById('btn-add-cam').disabled = false;
      document.getElementById('cam-name-input').focus();

      let cameraPayloads = [];
      if (savedCamerasRaw) {
        try {
          const savedCams = JSON.parse(savedCamerasRaw);
          cameraPayloads = Object.entries(savedCams).map(([id, cam]) => ({
            id,
            name: cam.name,
            orientation: cam.orientation || 'landscape'
          }));
        } catch {}
      }

      // Gabung room dan daftarkan kembali semua kamera yang tersimpan ke server
      socket.emit('join-room', { roomId: currentRoomId, role: 'dashboard', cameras: cameraPayloads });
      log(`Room dimuat kembali: ${currentRoomId}`, 'success');

      if (savedCamerasRaw) {
        try {
          const savedCams = JSON.parse(savedCamerasRaw);
          
          const empty = document.querySelector('.empty-state');
          if (empty) empty.remove();

          for (const [camId, cam] of Object.entries(savedCams)) {
            cameras[camId] = cam;
            const mobileLink = `${BASE_URL}/kamera.html?room=${currentRoomId}&cam=${camId}&name=${encodeURIComponent(cam.name)}`;
            const obsLink    = `${BASE_URL}/obs.html?room=${currentRoomId}&cam=${camId}`;
            renderCameraCard(camId, cam.name, mobileLink, obsLink);
            
            // Sync status kontrol tersimpan
            const resSelect = document.getElementById(`c-res-${camId}`);
            if (resSelect && cam.resolution) resSelect.value = cam.resolution;
            const oriSelect = document.getElementById(`c-ori-${camId}`);
            if (oriSelect && cam.orientation) oriSelect.value = cam.orientation;
            
            if (cam.isMuted) {
              document.getElementById(`mic-ic-${camId}`).textContent = '🔇';
              document.getElementById(`mic-lb-${camId}`).textContent = 'Unmute';
              document.getElementById(`c-mic-${camId}`)?.classList.add('on');
            }
            if (cam.isFlash) {
              document.getElementById(`flash-ic-${camId}`).textContent = '💡';
              document.getElementById(`flash-lb-${camId}`).textContent = 'Flash Off';
              document.getElementById(`c-flash-${camId}`)?.classList.add('on');
            }
          }
          updateCamCount();
        } catch (e) {
          console.error('Gagal memuat list kamera:', e);
        }
      }
    }
  });
</script>
</body>
</html>
