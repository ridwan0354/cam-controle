<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Source — Cam Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden}
    video{width:100%;height:100%;object-fit:contain;display:block;background:#000}

    /* Overlay: tampil saat belum ada stream */
    #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:10;transition:opacity .5s}
    #overlay.hidden{opacity:0;pointer-events:none}
    .ov-icon{font-size:3rem;margin-bottom:12px;animation:breathe 2.5s ease-in-out infinite}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .ov-title{color:rgba(255,255,255,.85);font-family:system-ui,sans-serif;font-size:1rem;font-weight:600;margin-bottom:6px;text-align:center}
    .ov-sub{color:rgba(255,255,255,.35);font-family:system-ui,sans-serif;font-size:.75rem;text-align:center;line-height:1.6}

    /* Camera name tag (optional, bisa disembunyikan di OBS) */
    .cam-tag{position:fixed;bottom:12px;left:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-family:system-ui,sans-serif;font-size:.65rem;padding:4px 10px;border-radius:6px;z-index:20;opacity:0;transition:.3s}
    .cam-tag.show{opacity:1}
  </style>
</head>
<body>

  <div id="overlay">
    <div class="ov-icon">📡</div>
    <div class="ov-title" id="ov-title">Menunggu Kamera...</div>
    <div class="ov-sub" id="ov-sub">Pastikan HP sudah membuka link kamera</div>
  </div>

  <video id="remote-video" autoplay playsinline muted></video>
  <div class="cam-tag" id="cam-tag"></div>

  <script>
    const params  = new URLSearchParams(location.search);
    const ROOM_ID = params.get('room');
    const CAM_ID  = params.get('cam');

    if (!ROOM_ID || !CAM_ID) {
      document.getElementById('ov-title').textContent = '⚠️ Link Tidak Valid';
      document.getElementById('ov-sub').textContent = 'Parameter room dan cam diperlukan.';
    }

    const socket = io();
    let pc = null;

    const STUN_SERVERS = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ],
    };

    // ============================================================
    // JOIN ROOM
    // ============================================================
    socket.on('connect', () => {
      if (ROOM_ID && CAM_ID) {
        socket.emit('join-room', { roomId: ROOM_ID, role: 'receiver', camId: CAM_ID });
        document.getElementById('ov-sub').textContent = `Room: ${ROOM_ID} | Cam: ${CAM_ID}`;
      }
    });

    socket.on('disconnect', () => {
      document.getElementById('ov-title').textContent = 'Server Terputus...';
      document.getElementById('overlay').classList.remove('hidden');
    });

    // ============================================================
    // WEBRTC — RECEIVE OFFER
    // ============================================================
    socket.on('webrtc-offer', async ({ camId, offer }) => {
      if (camId !== CAM_ID) return;

      if (pc) { pc.close(); pc = null; }

      pc = new RTCPeerConnection(STUN_SERVERS);

      // Terima video track dari sender
      pc.ontrack = (event) => {
        const video = document.getElementById('remote-video');
        const stream = event.streams[0] || new MediaStream([event.track]);
        video.srcObject = stream;
        video.muted = true;
        video.play().catch(e => console.warn('play error:', e));
      };

      // Kirim ICE candidate ke sender
      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          socket.emit('webrtc-ice-candidate', { roomId: ROOM_ID, camId: CAM_ID, candidate, targetRole: 'sender' });
        }
      };

      pc.onconnectionstatechange = () => {
        console.log('[WebRTC] State:', pc.connectionState);
        if (pc.connectionState === 'connected') {
          document.getElementById('overlay').classList.add('hidden');
          const tag = document.getElementById('cam-tag');
          tag.textContent = `📱 Cam: ${CAM_ID}`;
          tag.classList.add('show');
          // Force play sekali lagi setelah connected
          const vid = document.getElementById('remote-video');
          if (vid.srcObject) vid.play().catch(() => {});
        } else if (['disconnected', 'failed'].includes(pc.connectionState)) {
          document.getElementById('overlay').classList.remove('hidden');
          document.getElementById('ov-title').textContent = '📡 Kamera Terputus';
          document.getElementById('ov-sub').textContent = 'Menunggu HP terhubung kembali...';
        }
      };

      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('webrtc-answer', { roomId: ROOM_ID, camId: CAM_ID, answer });
    });

    socket.on('webrtc-ice-candidate', async ({ camId, candidate }) => {
      if (camId !== CAM_ID || !pc) return;
      try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    });

    socket.on('sender-disconnected', ({ camId }) => {
      if (camId !== CAM_ID) return;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('ov-title').textContent = '📴 Kamera Offline';
      document.getElementById('ov-sub').textContent = `Cam ${CAM_ID} terputus. Menunggu reconnect...`;
    });

    // Room status: update nama kamera
    socket.on('room-status', ({ cameras }) => {
      const cam = cameras[CAM_ID];
      if (cam?.name) {
        document.getElementById('cam-tag').textContent = `📱 ${cam.name}`;
        document.title = `OBS: ${cam.name}`;
        if (!cam.sender) {
          document.getElementById('ov-title').textContent = `Menunggu ${cam.name}...`;
        }
      }
    });
  </script>
</body>
</html>
