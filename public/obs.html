<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Source — Cam Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden}
    video{width:100%;height:100%;object-fit:contain;display:block;background:#000}

    /* Overlay: tampil saat belum ada stream */
    #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:10;transition:opacity .5s}
    #overlay.hidden{opacity:0;pointer-events:none}
    .ov-icon{font-size:3rem;margin-bottom:12px;animation:breathe 2.5s ease-in-out infinite}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .ov-title{color:rgba(255,255,255,.85);font-family:system-ui,sans-serif;font-size:1rem;font-weight:600;margin-bottom:6px;text-align:center}
    .ov-sub{color:rgba(255,255,255,.35);font-family:system-ui,sans-serif;font-size:.75rem;text-align:center;line-height:1.6}

    /* Camera name tag (optional, bisa disembunyikan di OBS) */
    .cam-tag{position:fixed;bottom:12px;left:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-family:system-ui,sans-serif;font-size:.65rem;padding:4px 10px;border-radius:6px;z-index:20;opacity:0;transition:.3s}
    .cam-tag.show{opacity:1}

    /* Indikator kecil: server offline tapi P2P masih hidup */
    #server-indicator{position:fixed;top:10px;right:10px;background:rgba(245,158,11,.9);color:#000;font-family:system-ui,sans-serif;font-size:.65rem;font-weight:700;padding:5px 10px;border-radius:6px;z-index:30;display:none;animation:fadeInOut 2.5s ease-in-out infinite}
    @keyframes fadeInOut{0%,100%{opacity:1}50%{opacity:.6}}
  </style>
</head>
<body>

  <div id="overlay">
    <div class="ov-icon">📡</div>
    <div class="ov-title" id="ov-title">Menunggu Kamera...</div>
    <div class="ov-sub" id="ov-sub">Pastikan HP sudah membuka link kamera</div>
  </div>

  <video id="remote-video" autoplay playsinline muted></video>
  <div class="cam-tag" id="cam-tag"></div>

  <script>
    const params  = new URLSearchParams(location.search);
    const ROOM_ID = params.get('room');
    const CAM_ID  = params.get('cam');
    const USE_AUDIO = params.get('audio') !== 'false';

    if (!ROOM_ID || !CAM_ID) {
      document.getElementById('ov-title').textContent = '⚠️ Link Tidak Valid';
      document.getElementById('ov-sub').textContent = 'Parameter room dan cam diperlukan.';
    }

    const socket = io();
    let pc = null;
    let flvPlayer = null;
    let isFlvPlaying = false;
    let flvPort = 8000; // default fallback

    // Ambil port FLV secara dinamis dari server info
    fetch('/api/info')
      .then(r => r.json())
      .then(d => {
        if (d.flvPort) {
          flvPort = d.flvPort;
          console.log('[OBS] Dynamic FLV Port loaded:', flvPort);
        }
      })
      .catch(e => console.warn('Failed to fetch api info:', e));

    const STUN_SERVERS = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ],
    };

    // ============================================================
    // JOIN ROOM
    // ============================================================
    socket.on('connect', () => {
      if (ROOM_ID && CAM_ID) {
        socket.emit('join-room', { roomId: ROOM_ID, role: 'receiver', camId: CAM_ID });
        document.getElementById('ov-sub').textContent = `Room: ${ROOM_ID} | Cam: ${CAM_ID}`;
      }
    });

    socket.on('disconnect', () => {
      // Hanya tampilkan layar hitam jika WebRTC P2P juga tidak aktif.
      // Jika P2P masih connected (video mengalir via WiFi lokal), biarkan video tetap tampil.
      const p2pActive = pc && pc.connectionState === 'connected';
      if (p2pActive) {
        // Tampilkan indikator kecil di pojok layar tanpa menutupi video
        showServerIndicator('⚠️ Server Offline – Video P2P Aktif');
      } else {
        document.getElementById('ov-title').textContent = 'Server Terputus...';
        document.getElementById('ov-sub').textContent = 'Menunggu koneksi kembali...';
        document.getElementById('overlay').classList.remove('hidden');
      }
    });

    socket.on('connect', () => {
      // Saat internet kembali, hapus indikator dan rejoin room
      hideServerIndicator();
      if (ROOM_ID && CAM_ID) {
        socket.emit('join-room', { roomId: ROOM_ID, role: 'receiver', camId: CAM_ID });
      }
    });

    // ============================================================
    // WEBRTC — RECEIVE OFFER
    // ============================================================
    socket.on('webrtc-offer', async ({ camId, offer }) => {
      if (camId !== CAM_ID) return;

      if (flvPlayer) {
        flvPlayer.destroy();
        flvPlayer = null;
        isFlvPlaying = false;
      }

      if (pc) { pc.close(); pc = null; }

      pc = new RTCPeerConnection(STUN_SERVERS);

      // Terima video track dari sender
      pc.ontrack = (event) => {
        const video = document.getElementById('remote-video');
        const stream = event.streams[0] || new MediaStream([event.track]);
        video.srcObject = stream;
        video.muted = true;
        video.play().catch(e => console.warn('play error:', e));
      };

      // Kirim ICE candidate ke sender
      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          socket.emit('webrtc-ice-candidate', { roomId: ROOM_ID, camId: CAM_ID, candidate, targetRole: 'sender' });
        }
      };

      pc.onconnectionstatechange = () => {
        console.log('[WebRTC] State:', pc.connectionState);
        if (pc.connectionState === 'connected') {
          document.getElementById('overlay').classList.add('hidden');
          const tag = document.getElementById('cam-tag');
          tag.textContent = `📱 Cam: ${CAM_ID}`;
          tag.classList.add('show');
          // Force play sekali lagi setelah connected
          const vid = document.getElementById('remote-video');
          if (vid.srcObject) vid.play().catch(() => {});
        } else if (['disconnected', 'failed'].includes(pc.connectionState)) {
          document.getElementById('overlay').classList.remove('hidden');
          document.getElementById('ov-title').textContent = '📡 Kamera Terputus';
          document.getElementById('ov-sub').textContent = 'Menunggu HP terhubung kembali...';
        }
      };

      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('webrtc-answer', { roomId: ROOM_ID, camId: CAM_ID, answer });
    });

    socket.on('webrtc-ice-candidate', async ({ camId, candidate }) => {
      if (camId !== CAM_ID || !pc) return;
      try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
    });

    socket.on('sender-disconnected', ({ camId }) => {
      if (camId !== CAM_ID) return;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('ov-title').textContent = '📴 Kamera Offline';
      document.getElementById('ov-sub').textContent = `Cam ${CAM_ID} terputus. Menunggu reconnect...`;
    });

    socket.on('camera-deleted', ({ camId }) => {
      if (camId !== CAM_ID) return;
      if (pc) {
        pc.close();
        pc = null;
      }
      document.getElementById('remote-video').srcObject = null;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('ov-title').textContent = '🗑️ Kamera Dihapus';
      document.getElementById('ov-sub').textContent = 'Kamera ini telah dihapus dari Dashboard.';
    });

    socket.on('room-not-found', () => {
      if (pc) {
        pc.close();
        pc = null;
      }
      document.getElementById('remote-video').srcObject = null;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('ov-title').textContent = '⚠️ Room Tidak Aktif';
      document.getElementById('ov-sub').textContent = 'Room ini sudah tidak aktif atau telah dihapus.';
    });

    socket.on('camera-not-found', () => {
      if (pc) {
        pc.close();
        pc = null;
      }
      document.getElementById('remote-video').srcObject = null;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('ov-title').textContent = '⚠️ Kamera Tidak Terdaftar';
      document.getElementById('ov-sub').textContent = 'Kamera ini tidak terdaftar atau telah dihapus.';
    });

    // Room status: update nama kamera dan orientasi
    socket.on('room-status', ({ cameras }) => {
      const cam = cameras[CAM_ID];
      if (cam) {
        if (cam.name) {
          const avatar = cam.type === 'rtmp' ? '🛸' : '📱';
          document.getElementById('cam-tag').textContent = `${avatar} ${cam.name}`;
          document.title = `OBS: ${cam.name}`;
          if (!cam.sender) {
            document.getElementById('ov-title').textContent = `Menunggu ${cam.name}...`;
            if (cam.type === 'rtmp') {
              document.getElementById('ov-sub').textContent = 'Menunggu aliran stream RTMP...';
            } else {
              document.getElementById('ov-sub').textContent = 'Pastikan HP sudah membuka link kamera';
            }
          }
        }
        if (cam.orientation) {
          applyOrientationStyle(cam.orientation);
        }
        
        // Putar RTMP stream secara otomatis jika tipenya rtmp
        if (cam.type === 'rtmp') {
          handleRtmpPlayback(cam.sender);
        }
      }
    });

    function handleRtmpPlayback(isLive) {
      const video = document.getElementById('remote-video');
      
      if (!isLive) {
        if (flvPlayer) {
          flvPlayer.destroy();
          flvPlayer = null;
        }
        isFlvPlaying = false;
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('ov-title').textContent = '📡 Kamera Offline';
        document.getElementById('ov-sub').textContent = 'Menunggu aliran stream RTMP...';
        return;
      }
      
      if (isFlvPlaying) return;
      
      const isHttps = location.protocol === 'https:';
      const protocol = isHttps ? 'wss:' : 'ws:';
      const wsHost = location.hostname;
      const streamKey = `${ROOM_ID}_${CAM_ID}`;
      
      // Di produksi (HTTPS), kita lewat proxy Nginx di port 443 (tanpa port tambahan).
      // Di lokal (HTTP), kita langsung tembak ke port FLV (3001).
      const flvUrl = isHttps 
        ? `${protocol}//${location.host}/live/${streamKey}.flv`
        : `${protocol}//${wsHost}:${flvPort}/live/${streamKey}.flv`;
      
      console.log('[RTMP] Connecting to:', flvUrl);
      
      if (mpegts.getFeatureList().mseLivePlayback) {
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('cam-tag').classList.add('show');
        
        // Setup listener error pada video element secara detail
        video.onerror = () => {
          console.error('[OBS Video Element Error]', video.error ? {
            code: video.error.code,
            message: video.error.message
          } : 'Unknown Error');
        };

        flvPlayer = mpegts.createPlayer({
          type: 'flv',
          isLive: true,
          url: flvUrl,
          hasAudio: USE_AUDIO
        }, {
          enableStashBuffer: false,
          liveBufferLatencyChasing: true
        });
        
        flvPlayer.attachMediaElement(video);
        flvPlayer.load();
        flvPlayer.play()
          .then(() => {
            isFlvPlaying = true;
            console.log('[RTMP] Playing...');
          })
          .catch(e => console.warn('[RTMP] Play error:', e));
          
        flvPlayer.on(mpegts.Events.ERROR, (type, detail, info) => {
          console.warn('[RTMP] Player error, retrying in 3s...', type, detail, info);
          setTimeout(() => {
            if (isLive && !isFlvPlaying) {
              handleRtmpPlayback(false);
              handleRtmpPlayback(true);
            }
          }, 3000);
        });
      }
    }

    // ============================================================
    // INDIKATOR SERVER OFFLINE (Muncul jika internet putus tapi P2P masih aktif)
    // ============================================================
    function showServerIndicator(msg) {
      let el = document.getElementById('server-indicator');
      if (!el) {
        el = document.createElement('div');
        el.id = 'server-indicator';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideServerIndicator() {
      const el = document.getElementById('server-indicator');
      if (el) el.style.display = 'none';
    }

    function applyOrientationStyle(orientation) {
      const video = document.getElementById('remote-video');
      if (!video) return;
      if (orientation === 'portrait') {
        video.style.width = 'auto';
        video.style.height = '100%';
        video.style.aspectRatio = '9/16';
        video.style.margin = '0 auto';
        video.style.objectFit = 'cover';
      } else {
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.aspectRatio = '16/9';
        video.style.margin = '0';
        video.style.objectFit = 'cover';
      }
    }
  </script>
</body>
</html>
